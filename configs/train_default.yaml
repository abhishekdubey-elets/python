# Sensible starting point for a real training run. Overridden per-run as needed.
# On CPU keep dtype: float32 and expect only the toy model to be trainable.
lr: 3.0e-4
min_lr: 3.0e-5
weight_decay: 0.1
beta1: 0.9
beta2: 0.95
grad_clip: 1.0

warmup_steps: 100
max_steps: 5000

micro_batch_size: 8
grad_accum_steps: 4

device: cpu
dtype: float32
compile: false
grad_checkpointing: false
seed: 1337

eval_interval: 250
eval_iters: 50
log_interval: 10
checkpoint_dir: checkpoints
